<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Icons -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="%sveltekit.assets%/favicon.svg"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%sveltekit.assets%/favicon-32.png"
    />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />

    <!-- Primary meta -->
    <title>
      Sébastien Fabié — Développeur fullstack JavaScript / TypeScript
    </title>
    <meta
      name="description"
      content="Développeur fullstack en formation chez O'clock. Backend Node.js / TypeScript. Disponible pour un stage à partir de juin 2026."
    />

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:url" content="https://sebvietsky.github.io" />
    <meta
      property="og:title"
      content="Sébastien Fabié — Développeur fullstack JavaScript / TypeScript"
    />
    <meta
      property="og:description"
      content="Développeur fullstack en formation chez O'clock. Backend Node.js / TypeScript. Disponible pour un stage à partir de juin 2026."
    />
    <meta
      property="og:image"
      content="https://sebvietsky.github.io/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Carte de visite de Sébastien Fabié, développeur fullstack."
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Sébastien Fabié — Développeur fullstack JavaScript / TypeScript"
    />
    <meta
      name="twitter:description"
      content="Développeur fullstack en formation chez O'clock. Backend Node.js / TypeScript."
    />
    <meta
      name="twitter:image"
      content="https://sebvietsky.github.io/og-image.png"
    />

    <!-- Theme anti-flash : appliqué AVANT le rendu pour éviter le flash visuel -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "dark" || stored === "light" ? stored : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
